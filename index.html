<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visor de Cómics</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; padding: 20px; }
        .login-box { background: #111; padding: 20px; border-radius: 15px; border: 1px solid #333; display: inline-block; }
        input { display: block; width: 240px; padding: 10px; margin: 10px auto; border-radius: 5px; border: 1px solid #444; background: #222; color: #fff; }
        button { background: #24A1DE; color: #fff; border: none; padding: 12px 20px; border-radius: 20px; cursor: pointer; font-weight: bold; width: 100%; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; margin-top: 20px; }
        .card { width: 150px; height: 220px; background: #222; border-radius: 8px; overflow: hidden; position: relative; }
        .card img { width: 100%; height: 100%; object-fit: cover; }
        #codeField { display: none; }
    </style>
</head>
<body>

    <h2>📚 Mi Colección</h2>

    <div id="auth" class="login-box">
        <input type="text" id="phone" placeholder="Número (+52...)">
        <input type="text" id="codeField" placeholder="Código de Telegram">
        <button id="actionBtn">CONECTAR</button>
    </div>

    <div id="gallery" class="grid"></div>

    <script type="module">
        // Usamos una versión de distribución diferente para saltar el error
        import { TelegramClient } from "https://esm.run/telegram@2.0.9";
        import { StringSession } from "https://esm.run/telegram@2.0.9/sessions/index.js";

        // --- CONFIGURA TUS DATOS ---
        const apiId = 33275752; 
        const apiHash = "f4574ef0f91bcc27c4fd6745168fdd89";
        const chatId = "-1001806099313"; 
        // ---------------------------

        // FORZAMOS LA CREACIÓN DE LA SESIÓN DE FORMA MANUAL
        const session = new StringSession("");
        let client = null;

        const btn = document.getElementById('actionBtn');
        const phoneInput = document.getElementById('phone');
        const codeInput = document.getElementById('codeField');

        btn.onclick = async () => {
            try {
                if (!client) {
                    btn.innerText = "INICIANDO...";
                    
                    client = new TelegramClient(session, apiId, apiHash, {
                        connectionRetries: 5,
                        useWSS: true // Forzamos WebSockets Seguros para Mini Apps
                    });

                    await client.start({
                        phoneNumber: async () => phoneInput.value,
                        phoneCode: async () => {
                            phoneInput.style.display = "none";
                            codeInput.style.display = "block";
                            btn.innerText = "VERIFICAR";
                            return new Promise(resolve => {
                                btn.onclick = () => resolve(codeInput.value);
                            });
                        },
                        onError: (err) => alert("Error: " + err.message)
                    });

                    document.getElementById('auth').style.display = "none";
                    loadPhotos();
                }
            } catch (e) {
                // Si vuelve a salir el error de StringSession, lo capturamos aquí
                alert("Error detectado: " + e.message);
                console.error(e);
            }
        };

        async function loadPhotos() {
            const gallery = document.getElementById('gallery');
            const msgs = await client.getMessages(chatId, { limit: 20 });
            
            for (const m of msgs) {
                if (m.media && m.photo) {
                    const buf = await client.downloadMedia(m.media, { workers: 1 });
                    const url = URL.createObjectURL(new Blob([buf]));
                    const div = document.createElement('div');
                    div.className = 'card';
                    div.innerHTML = `<img src="${url}">`;
                    gallery.appendChild(div);
                }
            }
        }
    </script>
</body>
</html>
