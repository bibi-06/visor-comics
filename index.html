<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Biblioteca de Cómics</title>
    <style>
        body { background: #0f0f0f; color: white; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; padding: 20px; }
        h1 { color: #24A1DE; font-size: 24px; margin-bottom: 30px; }
        
        .login-box { background: #1c1c1c; padding: 25px; border-radius: 20px; display: inline-block; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input { display: block; width: 260px; padding: 12px; margin: 10px auto; border-radius: 8px; border: 1px solid #444; background: #000; color: white; font-size: 16px; }
        .btn-connect { background: #24A1DE; color: white; border: none; padding: 14px; border-radius: 30px; cursor: pointer; width: 100%; font-weight: bold; font-size: 16px; transition: 0.3s; }
        .btn-connect:hover { background: #1d82b3; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; margin-top: 30px; padding-bottom: 50px; }
        
        /* Efecto de la tarjeta */
        .comic-card { width: 160px; height: 240px; perspective: 1000px; cursor: pointer; margin: auto; }
        .comic-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; }
        .comic-card.active .comic-inner { transform: rotateY(180deg); }
        
        .front, .back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 12px; overflow: hidden; border: 1px solid #333; }
        .front img { width: 100%; height: 100%; object-fit: cover; background: #222; }
        
        .back { background: #24A1DE; transform: rotateY(180deg); display: flex; align-items: center; justify-content: center; padding: 10px; font-size: 13px; font-weight: bold; line-height: 1.4; }
        
        #code { display: none; }
        #status { margin-top: 15px; font-size: 14px; color: #aaa; }
    </style>
</head>
<body>

    <h1>📚 Mi Biblioteca</h1>

    <div id="loginSection" class="login-box">
        <input type="text" id="phone" placeholder="Tu número (+52...)">
        <input type="text" id="code" placeholder="Código de Telegram">
        <button id="btnAction" class="btn-connect">CONECTAR</button>
        <div id="status">Ingresa tu número para empezar</div>
    </div>
    
    <div id="gallery" class="grid"></div>

    <script type="module">
        import { TelegramClient } from "https://cdn.esm.sh/telegram@2.0.9";
        import { StringSession } from "https://cdn.esm.sh/telegram@2.0.9/sessions";

        // --- CONFIGURACIÓN ---
        const apiId = 33275752; 
        const apiHash = "f4574ef0f91bcc27c4fd6745168fdd89";
        const chatId = "-1001806099313"; // Ejemplo: "-10012345678"
        // ---------------------

        let client;
        const session = new StringSession(""); // Iniciamos con sesión vacía pero válida

        window.onload = () => {
            const btn = document.getElementById("btnAction");
            const phoneInput = document.getElementById("phone");
            const codeInput = document.getElementById("code");
            const status = document.getElementById("status");

            btn.onclick = async () => {
                try {
                    if (!client) {
                        btn.innerText = "ENVIANDO...";
                        status.innerText = "Conectando con servidores de Telegram...";
                        
                        client = new TelegramClient(session, apiId, apiHash, { connectionRetries: 5 });

                        await client.start({
                            phoneNumber: async () => phoneInput.value,
                            phoneCode: async () => {
                                phoneInput.style.display = "none";
                                codeInput.style.display = "block";
                                btn.innerText = "VERIFICAR CÓDIGO";
                                status.innerText = "Ingresa el código que recibiste en Telegram";
                                return new Promise(resolve => {
                                    btn.onclick = () => resolve(codeInput.value);
                                });
                            },
                            onError: (err) => {
                                alert("Error: " + err.message);
                                location.reload(); // Reiniciar en caso de error crítico
                            },
                        });

                        document.getElementById("loginSection").style.display = "none";
                        status.innerText = "¡Conectado! Cargando portadas...";
                        cargarComics();
                    }
                } catch (e) {
                    alert("Error técnico: " + e.message);
                    btn.innerText = "REINTENTAR";
                }
            };
        };

        async function cargarComics() {
            const gallery = document.getElementById("gallery");
            try {
                // Buscamos los últimos 30 mensajes con fotos
                const messages = await client.getMessages(chatId, { limit: 30 });
                
                for (const msg of messages) {
                    if (msg.media && msg.photo) {
                        // Descarga de la miniatura
                        const buffer = await client.downloadMedia(msg.media, { workers: 1 });
                        const blob = new Blob([buffer]);
                        const url = URL.createObjectURL(blob);
                        
                        const card = document.createElement("div");
                        card.className = "comic-card";
                        card.onclick = () => card.classList.toggle("active");
                        
                        card.innerHTML = `
                            <div class="comic-inner">
                                <div class="front">
                                    <img src="${url}" loading="lazy">
                                </div>
                                <div class="back">
                                    <p>${msg.message || 'Sin descripción'}</p>
                                </div>
                            </div>`;
                        gallery.appendChild(card);
                    }
                }
            } catch (err) {
                console.error(err);
                alert("Error al leer el grupo: " + err.message);
            }
        }
    </script>
</body>
</html>
