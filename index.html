<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Biblioteca de Cómics</title>
    <script src="https://cdn.jsdelivr.net/npm/telegram@2.0.9/browser/telegram.min.js"></script>
    <style>
        body { background: #0f0f0f; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .login-box { background: #1c1c1c; padding: 25px; border-radius: 20px; display: inline-block; border: 1px solid #333; }
        input { display: block; width: 250px; padding: 12px; margin: 10px auto; border-radius: 8px; border: 1px solid #444; background: #000; color: white; }
        .btn-connect { background: #24A1DE; color: white; border: none; padding: 14px; border-radius: 30px; cursor: pointer; width: 100%; font-weight: bold; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; margin-top: 30px; }
        .comic-card { width: 160px; height: 240px; perspective: 1000px; cursor: pointer; margin: auto; }
        .comic-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; }
        .comic-card.active .comic-inner { transform: rotateY(180deg); }
        .front, .back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 12px; overflow: hidden; border: 1px solid #333; }
        .front img { width: 100%; height: 100%; object-fit: cover; }
        .back { background: #24A1DE; transform: rotateY(180deg); display: flex; align-items: center; justify-content: center; padding: 10px; font-size: 12px; }
        #code { display: none; }
    </style>
</head>
<body>

    <h1>📚 Mi Biblioteca</h1>

    <div id="loginSection" class="login-box">
        <input type="text" id="phone" placeholder="Tu número (+52...)">
        <input type="text" id="code" placeholder="Código de Telegram">
        <button id="btnAction" class="btn-connect">CONECTAR</button>
    </div>
    
    <div id="gallery" class="grid"></div>

    <script>
        // --- CONFIGURACIÓN ---
        const apiId = 33275752; 
        const apiHash = "f4574ef0f91bcc27c4fd6745168fdd89";
        const chatId = "-1001806099313"; 
        // ---------------------

        // Usamos la versión global de la librería para evitar el error de StringSession
        const { TelegramClient, sessions } = window.telegram;
        const stringSession = new sessions.StringSession(""); 

        let client;

        document.getElementById("btnAction").onclick = async () => {
            const btn = document.getElementById("btnAction");
            const phoneInput = document.getElementById("phone");
            const codeInput = document.getElementById("code");

            try {
                if (!client) {
                    btn.innerText = "ENVIANDO...";
                    client = new TelegramClient(stringSession, apiId, apiHash, { connectionRetries: 5 });

                    await client.start({
                        phoneNumber: async () => phoneInput.value,
                        phoneCode: async () => {
                            phoneInput.style.display = "none";
                            codeInput.style.display = "block";
                            btn.innerText = "VERIFICAR CÓDIGO";
                            return new Promise(resolve => {
                                btn.onclick = () => resolve(codeInput.value);
                            });
                        },
                        onError: (err) => alert("Error: " + err.message),
                    });

                    document.getElementById("loginSection").style.display = "none";
                    cargarComics();
                }
            } catch (e) {
                alert("Error técnico: " + e.message);
                console.error(e);
            }
        };

        async function cargarComics() {
            const gallery = document.getElementById("gallery");
            try {
                const messages = await client.getMessages(chatId, { limit: 30 });
                for (const msg of messages) {
                    if (msg.media && msg.photo) {
                        const buffer = await client.downloadMedia(msg.media, { workers: 1 });
                        const url = URL.createObjectURL(new Blob([buffer]));
                        const card = document.createElement("div");
                        card.className = "comic-card";
                        card.onclick = () => card.classList.toggle("active");
                        card.innerHTML = `
                            <div class="comic-inner">
                                <div class="front"><img src="${url}" width="100%" height="100%"></div>
                                <div class="back"><p>${msg.message || 'Cómic'}</p></div>
                            </div>`;
                        gallery.appendChild(card);
                    }
                }
            } catch (err) {
                alert("Error al cargar: " + err.message);
            }
        }
    </script>
</body>
</html>
