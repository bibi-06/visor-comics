<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi Biblioteca de Cómics</title>
    <style>
        body { background: #0f0f0f; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .btn-connect { background: #24A1DE; color: white; border: none; padding: 15px 30px; border-radius: 30px; font-size: 18px; cursor: pointer; margin-top: 50px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; margin-top: 30px; }
        .comic-card { width: 200px; height: 300px; background: #222; border-radius: 10px; display: flex; align-items: center; justify-content: center; transition: 0.3s; cursor: pointer; }
        .comic-card:hover { transform: scale(1.05); border: 2px solid #24A1DE; }
    </style>
</head>
<body>

    <h1>📚 Mi Repositorio de Cómics</h1>
    <button id="btnConnect" class="btn-connect">Conectar con Telegram</button>
    
    <div id="gallery" class="grid"></div>

    <script type="module">
        import { TelegramClient } from "https://cdn.esm.sh/v128/telegram@2.0.9";
        import { StringSession } from "https://cdn.esm.sh/v128/telegram/sessions";

        // --- PON TUS DATOS REALES AQUÍ ---
        const apiId = 33275752; 
        const apiHash = "f4574ef0f91bcc27c4fd6745168fdd89";
        const chatId = "-1001806099313"; // Ej: -100123456789
        // --------------------------------

        const btn = document.getElementById("btnConnect");
        const session = new StringSession(""); 

        btn.onclick = async () => {
            btn.innerText = "Conectando...";
            const client = new TelegramClient(session, apiId, apiHash, { connectionRetries: 5 });

            try {
                await client.start({
                    phoneNumber: async () => prompt("Ingresa tu número (+52...)"),
                    phoneCode: async () => prompt("Ingresa el código que te llegó a Telegram"),
                    onError: (err) => alert("Error: " + err.message),
                });

                btn.style.display = "none";
                alert("¡Conectado con éxito!");

                // Aquí es donde el código buscará tus cómics
                const messages = await client.getMessages(chatId, { limit: 20 });
                const gallery = document.getElementById("gallery");

                messages.forEach(msg => {
                    if (msg.media) {
                        const card = document.createElement("div");
                        card.className = "comic-card";
                        card.innerText = "Cómic Encontrado";
                        gallery.appendChild(card);
                    }
                });

            } catch (error) {
                alert("Algo salió mal: " + error.message);
                btn.innerText = "Reintentar Conexión";
            }
        };
    </script>
</body>
</html>
