<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi Biblioteca de Cómics</title>
    <style>
        body { background: #0f0f0f; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .login-box { background: #1c1c1c; padding: 20px; border-radius: 15px; display: inline-block; margin-top: 50px; border: 1px solid #333; }
        input { display: block; width: 250px; padding: 10px; margin: 10px auto; border-radius: 5px; border: 1px solid #444; background: #000; color: white; }
        .btn-connect { background: #24A1DE; color: white; border: none; padding: 12px 25px; border-radius: 30px; cursor: pointer; width: 100%; font-weight: bold; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; margin-top: 30px; }
        .comic-card { width: 200px; height: 300px; background: #222; border-radius: 10px; display: flex; align-items: center; justify-content: center; border: 1px dashed #444; }
        #codeField { display: none; } /* Oculto hasta que se necesite */
    </style>
</head>
<body>

    <h1>📚 Mi Repositorio de Cómics</h1>

    <div id="loginSection" class="login-box">
        <input type="text" id="phone" placeholder="Número (+52...)">
        <input type="text" id="code" placeholder="Código de Telegram" id="codeField">
        <button id="btnAction" class="btn-connect">Conectar</button>
    </div>
    
    <div id="gallery" class="grid"></div>

    <script type="module">
        import { TelegramClient } from "https://cdn.skypack.dev/telegram";
        import { StringSession } from "https://cdn.skypack.dev/telegram/sessions";

        // --- TUS DATOS ---
        const apiId = 33275752; 
        const apiHash = f4574ef0f91bcc27c4fd6745168fdd89;
        const chatId = -1001806099313; 
        // -----------------

        let client;
        const phoneInput = document.getElementById("phone");
        const codeInput = document.getElementById("code");
        const btn = document.getElementById("btnAction");
        const session = new StringSession(""); 

        btn.onclick = async () => {
            if (!client) {
                btn.innerText = "Enviando Código...";
                client = new TelegramClient(session, apiId, apiHash, { connectionRetries: 5 });
                
                await client.start({
                    phoneNumber: async () => phoneInput.value,
                    phoneCode: async () => {
                        // Mostramos el campo del código cuando Telegram lo pida
                        phoneInput.style.display = "none";
                        codeInput.style.display = "block";
                        btn.innerText = "Verificar Código";
                        
                        // Esperamos a que el usuario escriba el código y pulse de nuevo el botón
                        return new Promise(resolve => {
                            btn.onclick = () => resolve(codeInput.value);
                        });
                    },
                    onError: (err) => alert("Error: " + err.message),
                });

                document.getElementById("loginSection").style.display = "none";
                alert("¡Conectado!");
                cargarComics();
            }
        };

        async function cargarComics() {
            const messages = await client.getMessages(chatId, { limit: 20 });
            const gallery = document.getElementById("gallery");
            messages.forEach(msg => {
                if (msg.media) {
                    const card = document.createElement("div");
                    card.className = "comic-card";
                    card.innerText = "Imagen Detectada";
                    gallery.appendChild(card);
                }
            });
        }
    </script>
</body>
</html>
