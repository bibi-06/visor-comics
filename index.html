<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi Biblioteca de Cómics</title>
    <style>
        body { background: #0f0f0f; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 20px; }
        h1 { text-align: center; color: #24A1DE; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 30px; padding: 20px; }

        /* Estética de la tarjeta */
        .comic-card { width: 200px; height: 300px; perspective: 1000px; cursor: pointer; margin: auto; }
        .comic-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); transform-style: preserve-3d; }
        .comic-card.active .comic-inner { transform: rotateY(180deg); }

        .front, .back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 12px; overflow: hidden; box-shadow: 0 15px 35px rgba(0,0,0,0.5); border: 1px solid #333; }
        
        .front img { width: 100%; height: 100%; object-fit: cover; }
        
        .back { background: #242424; transform: rotateY(180deg); display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 15px; }
        
        .btn-leer { background: #24A1DE; color: white; border: none; padding: 10px 20px; border-radius: 20px; margin-top: 10px; cursor: pointer; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>

    <h1>📚 Mi Repositorio de Cómics</h1>
    <div id="gallery" class="grid">
        </div>

    <script type="module">
        import { TelegramClient } from "https://cdn.esm.sh/v128/telegram@2.0.9";
        import { StringSession } from "https://cdn.esm.sh/v128/telegram/sessions";

        // --- CONFIGURA TUS DATOS AQUÍ ---
        const apiId = 33275752; // Reemplaza con tu api_id (sin comillas)
        const apiHash = "f4574ef0f91bcc27c4fd6745168fdd89"; // Reemplaza con tu api_hash (con comillas)
        const chatId = "#-1001806099313"; // El ID de tu grupo privado
        // --------------------------------

        const session = new StringSession(""); 

        (async () => {
            const client = new TelegramClient(session, apiId, apiHash, { connectionRetries: 5 });

            // Proceso de Login
            await client.start({
                phoneNumber: async () => prompt("Tu número (+52...)"),
                phoneCode: async () => prompt("Código de Telegram"),
                onError: (err) => alert("Error: " + err.message),
            });

            console.log("Conectado!");
            const gallery = document.getElementById("gallery");

            // Buscamos los últimos 50 mensajes con fotos
            const messages = await client.getMessages(chatId, { limit: 50 });

            for (const msg of messages) {
                if (msg.media && msg.photo) {
                    // Creamos la tarjeta visual
                    const card = document.createElement("div");
                    card.className = "comic-card";
                    card.onclick = () => card.classList.toggle("active");

                    // Aquí necesitaríamos generar una URL para la imagen
                    // Por seguridad de la API, esto requiere un paso técnico extra de descarga
                    // Por ahora, usaremos un marcador de posición para que veas la estructura
                    card.innerHTML = `
                        <div class="comic-inner">
                            <div class="front">
                                <img src="https://via.placeholder.com/200x300/24A1DE/ffffff?text=Cargando..." alt="Comic">
                            </div>
                            <div class="back">
                                <h3>Cómic Detectado</h3>
                                <p>${msg.message || "Sin descripción"}</p>
                                <button class="btn-leer">Ver en Telegram</button>
                            </div>
                        </div>
                    `;
                    gallery.appendChild(card);
                }
            }
        })();
    </script>
</body>
</html>
